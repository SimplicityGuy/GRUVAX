<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img">
  <title>GRUVAX</title>
  <desc>GRUVAX favicon. Simplified 4×4 grid mark on white ground with blue border.</desc>

  <!-- Background -->
  <rect width="32" height="32" fill="#FFFFFF"/>

  <!-- Blue border with slightly rounded corners to survive favicon scaling -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="3" fill="none" stroke="#0051A2" stroke-width="2.5"/>

  <!-- ── Grid: 4×4 · 5px cells · 1.5px gaps · origin (4, 4) ── -->
  <!-- Columns x: 4 · 10.5 · 17 · 23.5 -->
  <!-- Rows    y: 4 · 10.5 · 17 · 23.5 -->

  <!-- Dim cells -->
  <rect x="4"    y="4"    width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="10.5" y="4"    width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="23.5" y="4"    width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="4"    y="10.5" width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="10.5" y="10.5" width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="23.5" y="10.5" width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="23.5" y="17"   width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="4"    y="23.5" width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="10.5" y="23.5" width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="17"   y="23.5" width="5" height="5" rx="0.5" fill="#D8E8F5"/>
  <rect x="23.5" y="23.5" width="5" height="5" rx="0.5" fill="#D8E8F5"/>

  <!-- Lit cells -->
  <rect x="17"   y="4"    width="5" height="5" rx="0.5" fill="#FFDA00"/>
  <rect x="17"   y="10.5" width="5" height="5" rx="0.5" fill="#FFDA00"/>
  <rect x="4"    y="17"   width="5" height="5" rx="0.5" fill="#FFDA00"/>
  <rect x="10.5" y="17"   width="5" height="5" rx="0.5" fill="#FFDA00"/>
  <rect x="17"   y="17"   width="5" height="5" rx="0.5" fill="#FFDA00"/>

</svg>
