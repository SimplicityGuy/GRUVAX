---
# Source: adapted from discogsography/.pre-commit-config.yaml
# Key changes from disco:
#  - Rust hooks dropped (no Rust in GRUVAX)
#  - shfmt targets: scripts/update-project.sh only (not the multi-script fan-out)
#  - Add frontend linting hooks (eslint, prettier via local hooks)
#  - All revs updated to current latest (see 09-RESEARCH.md pre-commit Hook Revs table)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-json
        exclude: '^frontend/(tsconfig|package).*\.json$'
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: pretty-format-json
        args: [--autofix, --indent=2]
        exclude: '^frontend/(tsconfig|package).*\.json$'

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 943377262562a12b57292fc98fabd7dbf81451fe  # frozen: 0.37.2
    hooks:
      - id: check-github-workflows
      - id: check-github-actions

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0671d8ab202c4ac093b78433ae5baf74f3fc7246  # frozen: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
    hooks:
      - id: bandit
        args: [-x, "tests", -s, "B608"]

  - repo: https://github.com/hadolint/hadolint
    rev: 4e697ba704fd23b2409b947a319c19c3ee54d24f  # frozen: v2.14.0
    hooks:
      # docker variant: runs hadolint via its image so no host binary is required
      # (the `hadolint` system hook fails in CI with "Executable hadolint not found").
      - id: hadolint-docker

  - repo: https://github.com/IamTheFij/docker-pre-commit
    rev: f626253b23de45412865c07fd076ff95d4cd77a7  # frozen: v3.0.1
    hooks:
      - id: docker-compose-check
        files: ^compose\.yaml$  # GRUVAX uses compose.yaml not docker-compose.yml

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint
        args: ["-ignore", "SC2129"]

  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict, -c=.yamllint]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--shell=bash, --severity=warning]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: 05c1426671b9237fb5e1444dd63aa5731bec0dfb  # frozen: v3.13.1-1
    hooks:
      - id: shfmt
        args: [--indent=2, --case-indent, --language-dialect=bash, --write]
        files: ^scripts/update-project\.sh$  # single script only (not disco's multi-file list)

  # Local hooks — run against system toolchain via uv/npm
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["--strict", "src/gruvax/"]
      - id: eslint
        name: eslint
        entry: npm --prefix frontend run lint
        language: system
        files: '^frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: npm --prefix frontend exec prettier -- --check src/
        language: system
        files: '^frontend/src/.*\.(ts|tsx|css)$'
        pass_filenames: false
      - id: tsc
        name: tsc (type check)
        entry: npm --prefix frontend exec tsc -- --noEmit -p frontend/tsconfig.app.json
        language: system
        files: '^frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false
