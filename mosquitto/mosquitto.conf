# GRUVAX Mosquitto broker configuration
# Internal-only broker — no host ports exposed (DEP-01 / T-01-12)

# Persistence: retain messages across broker restarts
persistence true
persistence_location /mosquitto/data/

# Listener bound to all interfaces inside the Docker network
# Only reachable within the Compose internal network — no ports: in compose.yaml
listener 1883

# Authentication — password file (generated by operator, gitignored)
# To generate: mosquitto_passwd -c mosquitto/passwd <username>
# For initial dev without a passwd file, allow anonymous on internal network only.
# Uncomment the next two lines and comment out allow_anonymous once passwd file is created:
# password_file /mosquitto/config/passwd
# allow_anonymous false
allow_anonymous true

# Logging
log_dest stderr
log_type error
log_type warning
log_type notice
log_type information
