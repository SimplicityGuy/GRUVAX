# GRUVAX Test Suite — called by build.yml after the code-quality gate passes.
#
# Runs on every push and pull_request to main (via workflow_call from build.yml).
# Uses the SYNTHETIC dataset only (tests/fixtures/legacy/synth_collection.sql
# for the v_collection downgrade target; tests/fixtures/synth_profile_collection.sql
# for post-P1 positioning tests). NEVER seeds the real collection CSV or
# background/ — those are gitignored local-only references and must never
# enter CI or any Docker image.
#
# Key gates (hard-fail, no continue-on-error):
#   1. Alembic round-trip (upgrade head -> downgrade base -> upgrade head) —
#      OBS-03 + Plan 01-01 D-19. Migration 0009's downgrade re-creates
#      gruvax.v_collection over gruvax_dev (seeded above) via an explicit
#      SET LOCAL search_path widening (Pitfall 5).
#   2. Benchmark SLO gate via scripts/check_benchmark.py — SC5
#      search p95 <= 200 ms, locate p95 <= 50 ms on synthetic data

name: Test

on:
  workflow_call:

env:
  CI: true
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "26"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: gruvax
          POSTGRES_PASSWORD: gruvax
          POSTGRES_DB: gruvax
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gruvax -d gruvax"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: "postgresql+psycopg://gruvax:gruvax@localhost:5432/gruvax"
      # OBSERVED_DISCOGSOGRAPHY_SCHEMA is no longer consumed by the runtime
      # (Plan 01-01 / D-12 removed it from gruvax.settings). The env entry is
      # kept here as a documentation marker for the downgrade-leg context —
      # migration 0009's downgrade re-broadens search_path to include
      # gruvax_dev so the recreated v_collection's unqualified body resolves
      # against the legacy seed loaded below (Pitfall 5).
      OBSERVED_DISCOGSOGRAPHY_SCHEMA: "gruvax_dev"
      SESSION_SECRET: "ci-test-secret-not-real"
      # Fernet key validated at boot (Plan 01-01 / D-01) — generated for CI
      # only; never reused for real deployments.
      GRUVAX_SECRET_KEY: "tcS1ujQX9eFv2gXr9w8t1V0qBu3UdMVqJTrYqDQ7Wxg="
      # DISCOGSOGRAPHY_BASE_URL must be present for boot (D-18); the CI test
      # suite never hits a real upstream — pytest fixtures stub the HTTP
      # client and route to the in-process fake-discogsography.
      DISCOGSOGRAPHY_BASE_URL: "http://fake-discogsography:8004"
      LOG_LEVEL: "WARNING"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: uv sync --frozen

      # Plan 03-05: tests/browser/test_reboot_persistence.py drives a real
      # Chromium via Playwright. `uv sync` installs the playwright package but
      # NOT the browser binary — install it (with OS deps) so the
      # persistent-context reboot test runs instead of erroring on a missing
      # executable.
      - name: Install Playwright browser (chromium)
        run: uv run playwright install --with-deps chromium

      # Seed ONLY the synthetic dataset — never the real collection CSV or background/
      # Plan 01-00 moved this file from fixtures/ to tests/fixtures/legacy/ so the
      # downgrade leg of the round-trip (migration 0009) can resolve gruvax_dev's
      # source tables via the SET LOCAL search_path widening (Pitfall 5).
      - name: Seed legacy synthetic collection (for v_collection downgrade target)
        run: psql postgresql://gruvax:gruvax@localhost:5432/gruvax < tests/fixtures/legacy/synth_collection.sql

      # OBS-03 + Plan 01-01 D-19: Alembic round-trip — must exercise all
      # migrations including 0009's drop-and-recreate of gruvax.v_collection.
      # The legacy seed loaded above creates the gruvax_dev.{artists, releases,
      # collection_items} tables that 0009's downgrade CREATE VIEW depends on.
      - name: Alembic round-trip
        run: just migrate-roundtrip

      # Seed cube_boundaries from the canonical fixture so tests have the (1,0,0)..
      # baseline rows the boundary-editor / locate / segment tests assume. The
      # compose runbook seeds this on api-container startup, but the test job runs
      # the app in-process via LifespanManager and skips that startup hook.
      - name: Seed cube_boundaries
        run: uv run python -m gruvax.db.seed_boundaries fixtures/boundaries.yaml

      # Plan 01-06: seed gruvax.profile_collection from the canonical synthetic
      # fixture so search + locate paths return real rows. Migration 0009's
      # round-trip is exercised above; the final upgrade leaves
      # profile_collection empty.  The benchmark + search/locate suites need
      # rows to exercise the index-backed FTS path within SLO.
      - name: Seed synthetic profile_collection
        run: psql postgresql://gruvax:gruvax@localhost:5432/gruvax < tests/fixtures/synth_profile_collection.sql

      # Full test suite (benchmarks are skipped by addopts --benchmark-disable)
      - name: Test suite
        run: uv run pytest tests/ -q --tb=short

      # SC5: Benchmark SLO gate — HARD FAIL on regression (no continue-on-error)
      # Plan 01-06: ``just slo`` is the single source of truth — runs locally
      # and in CI so the gate executes the same code path everywhere.  The
      # unit-level locate benchmark is run separately so a code-only
      # regression in estimator/algorithm.py is caught even when
      # profile_collection re-seeding fails (independent failure mode).
      - name: Benchmark SLO gate
        run: |
          just slo
          uv run pytest \
            tests/unit/test_algorithm.py::test_locate_benchmark \
            --benchmark-only --benchmark-json=benchmark.json -q
          uv run python scripts/check_benchmark.py benchmark.json
