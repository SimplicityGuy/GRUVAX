# GRUVAX Code Quality Gate — called by build.yml; must pass before test and build run.
#
# Runs pre-commit run --all-files as the single source of truth (D-02).
# No separate ruff/mypy/eslint/prettier/tsc steps — all linters run inside pre-commit.
# Frontend dependencies installed so pre-commit hooks can run eslint/prettier/tsc.

name: Code Quality

on:
  workflow_call:

env:
  CI: true
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "26"

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache pre-commit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-v1-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-v1-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Run pre-commit (all-files — single source of truth per D-02)
        # Placeholder secrets so pre-commit's docker-compose-check hook can resolve
        # the `${VAR:?}` required-variable substitutions in compose.yaml (the same
        # guards Test 4 validates). These are throwaway CI values — never deployed.
        env:
          GRUVAX_ADMIN_PIN: "1234"
          GRUVAX_SECRET_KEY: "tcS1ujQX9eFv2gXr9w8t1V0qBu3UdMVqJTrYqDQ7Wxg="
          SESSION_SECRET: "ci-test-secret-not-real"
        run: uv run pre-commit run --all-files
