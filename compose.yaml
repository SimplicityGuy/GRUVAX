---
# GRUVAX Docker Compose stack — gruvax-api + mosquitto
#
# DATABASE CONNECTIVITY NOTE
# ─────────────────────────────────────────────────────────────────────────────
# This compose file wires gruvax-api to either:
#
#   1. Host dev Postgres (default for local dev):
#      The gruvax-api container uses `host.docker.internal` to reach the
#      gruvax-dev-pg container running on the host (`localhost:5432`).
#      On Linux, add `extra_hosts: ["host.docker.internal:host-gateway"]`
#      to the gruvax-api service (already done below).
#      DATABASE_URL must use host.docker.internal instead of localhost.
#
#   2. The shared discogsography Postgres (production on `lux`):
#      Uncomment the `discogsography_default` network references and set
#      DATABASE_URL to point at the shared Postgres container name.
#      The external network must be created by the discogsography stack first:
#        docker network create discogsography_default
#      or it already exists from `docker compose up` in that project.
#
# RUNBOOK (local dev)
# ─────────────────────────────────────────────────────────────────────────────
#   1. just up                # ONE command: builds + starts gruvax-dev-pg
#                             # (auto-seeds the synthetic collection via initdb),
#                             # gruvax-api (auto-runs migrations + seeds cube
#                             # boundaries), and mosquitto.
#   2. open http://localhost:8000
#   3. docker compose down    # stop and remove containers (no -v to keep volumes!)
#
# The synthetic collection (fixtures/synth_collection.sql) loads ONCE when the
# gruvax-dev-pg data volume is first created. To re-seed from scratch, remove the
# data volume: `docker compose down && docker volume rm gruvax_gruvax-dev-pg-data`.
#
# To point at the shared discogsography Postgres on `lux` instead of the bundled
# dev Postgres, set GRUVAX_DB_HOST/PORT/USER/PASSWORD/NAME in the environment
# before `docker compose up` (the dev-pg service can be left running or stopped).
#
# Never run `docker compose down -v` unless you intentionally want to wipe the
# mosquitto-data volume (retained LED state in Phase 5+).

services:

  gruvax-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gruvax-api:local
    env_file:
      # Loads SESSION_SECRET (and any other secrets not listed below).
      # Explicit environment: entries below override values from .env.
      - path: .env
        required: false
    environment:
      # Default: the bundled gruvax-dev-pg service (same compose network).
      # Override GRUVAX_DB_HOST (e.g. to the shared discogsography Postgres on lux)
      # to point elsewhere without editing this file.
      DATABASE_URL: "postgresql+psycopg://${GRUVAX_DB_USER:-gruvax}:${GRUVAX_DB_PASSWORD:-gruvax}@${GRUVAX_DB_HOST:-gruvax-dev-pg}:${GRUVAX_DB_PORT:-5432}/${GRUVAX_DB_NAME:-gruvax}"
      OBSERVED_DISCOGSOGRAPHY_SCHEMA: "${OBSERVED_DISCOGSOGRAPHY_SCHEMA:-gruvax_dev}"
      MQTT_HOST: "mosquitto"
      MQTT_PORT: "1883"
      MQTT_USERNAME: "${MQTT_USERNAME:-gruvax-api}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    ports:
      - "8000:8000"
    networks:
      - internal
      # Uncomment to attach to the shared discogsography Postgres network (production):
      # - discogsography_default
    extra_hosts:
      # Linux: lets host.docker.internal resolve to the Docker host gateway
      # macOS/Windows: host.docker.internal is built in — this is a no-op there
      - "host.docker.internal:host-gateway"
    depends_on:
      gruvax-dev-pg:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Local dev Postgres. A single `just up` brings this up with data: on first
  # start the mounted fixtures/synth_collection.sql runs via initdb, creating the
  # gruvax_dev schema + ~200 synthetic records BEFORE gruvax-api migrates (so the
  # v_collection view in migration 0002 resolves). gruvax-api seeds cube
  # boundaries on startup. To use lux instead, set GRUVAX_DB_HOST (see header).
  gruvax-dev-pg:
    image: postgres:18
    container_name: gruvax-dev-pg
    environment:
      POSTGRES_USER: "${GRUVAX_DB_USER:-gruvax}"
      POSTGRES_PASSWORD: "${GRUVAX_DB_PASSWORD:-gruvax}"
      POSTGRES_DB: "${GRUVAX_DB_NAME:-gruvax}"
    ports:
      - "5432:5432"
    volumes:
      # postgres:18+ stores data in a major-version subdir under this mount
      # point — mount at /var/lib/postgresql (NOT /var/lib/postgresql/data).
      - gruvax-dev-pg-data:/var/lib/postgresql
      - ./fixtures/synth_collection.sql:/docker-entrypoint-initdb.d/10-synth_collection.sql:ro
    networks:
      - internal
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${GRUVAX_DB_USER:-gruvax} -d ${GRUVAX_DB_NAME:-gruvax}"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      # Uncomment once a passwd file is generated by the operator:
      # - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    # NO ports: — mosquitto is internal-only in v1 (DEP-01 / T-01-12)
    # ESP32 hardware will connect via the LAN listener added in Phase 5.
    networks:
      - internal
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  gruvax-dev-pg-data:
  mosquitto-data:
  mosquitto-log:

networks:
  internal:
    driver: bridge
  # Uncomment for production (discogsography_default must exist before compose up):
  # discogsography_default:
  #   external: true
