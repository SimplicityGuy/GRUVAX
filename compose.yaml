---
# GRUVAX Docker Compose stack — api + mosquitto (container: gruvax-api-1)
#
# DATABASE CONNECTIVITY NOTE
# ─────────────────────────────────────────────────────────────────────────────
# This compose file wires the api service to either:
#
#   1. Host dev Postgres (default for local dev):
#      The api container uses `host.docker.internal` to reach the
#      gruvax-dev-pg container running on the host (`localhost:5432`).
#      On Linux, add `extra_hosts: ["host.docker.internal:host-gateway"]`
#      to the api service (already done below).
#      DATABASE_URL must use host.docker.internal instead of localhost.
#
#   2. The shared discogsography Postgres (production on the deployment host):
#      Uncomment the `discogsography_default` network references and set
#      DATABASE_URL to point at the shared Postgres container name.
#      The external network must be created by the discogsography stack first:
#        docker network create discogsography_default
#      or it already exists from `docker compose up` in that project.
#
# RUNBOOK (local dev)
# ─────────────────────────────────────────────────────────────────────────────
#   1. just up                # ONE command: builds + starts gruvax-dev-pg
#                             # (auto-seeds the synthetic collection via initdb),
#                             # api (auto-runs migrations + seeds cube
#                             # boundaries), and mosquitto.
#   2. open http://localhost:8000
#   3. docker compose down    # stop and remove containers (no -v to keep volumes!)
#
# The synthetic collection (fixtures/synth_collection.sql) loads ONCE when the
# gruvax-dev-pg data volume is first created. To re-seed from scratch, remove the
# data volume: `docker compose down && docker volume rm gruvax_gruvax-dev-pg-data`.
#
# To point at the shared discogsography Postgres on the deployment host instead of the bundled
# dev Postgres, set GRUVAX_DB_HOST/PORT/USER/PASSWORD/NAME in the environment
# before `docker compose up` (the dev-pg service can be left running or stopped).
#
# Never run `docker compose down -v` unless you intentionally want to wipe the
# mosquitto-data volume (retained LED state in Phase 5+).

services:

  api:
    image: ghcr.io/simplicityguy/gruvax:latest
    # Build-or-pull: local dev (`just up` / `just build`, which use `--build`)
    # builds this image from source and tags it as the `image:` name above;
    # production deploys `docker compose pull` the same tag published by CI to
    # GHCR. With both `build:` and `image:` present, a plain `docker compose up`
    # also builds the image locally when it isn't already cached, instead of
    # failing to pull an unpublished tag.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: "${GIT_SHA:-unknown}"
        BUILD_TIMESTAMP: "${BUILD_TIMESTAMP:-unknown}"
        GRUVAX_ENV: "${GRUVAX_ENV:-production}"
    env_file:
      # Loads SESSION_SECRET (and any other secrets not listed below).
      # Explicit environment: entries below override values from .env.
      - path: .env
        required: false
    environment:
      # Default: the bundled gruvax-dev-pg service (same compose network).
      # Override GRUVAX_DB_HOST (e.g. to the shared discogsography Postgres on the deployment host)
      # to point elsewhere without editing this file.
      DATABASE_URL: "postgresql+psycopg://${GRUVAX_DB_USER:-gruvax}:${GRUVAX_DB_PASSWORD:-gruvax}@${GRUVAX_DB_HOST:-gruvax-dev-pg}:${GRUVAX_DB_PORT:-5432}/${GRUVAX_DB_NAME:-gruvax}"
      # Plan 01-01 / D-12 retired the legacy observed-discogsography-schema
      # env entry (removed 2026-05-27); the runtime pool's search_path is now
      # a single literal `gruvax, public` and no application code branches on
      # the discogsography schema name.
      #
      # Plan 01-01 / D-18: discogsography contact surface is now an HTTP API.
      # Default points at the Plan 05 fake-discogsography sibling service; in
      # production override via .env.
      DISCOGSOGRAPHY_BASE_URL: "${DISCOGSOGRAPHY_BASE_URL:-http://fake-discogsography:8004}"
      # Plan 01-01 / D-01: Fernet key for PAT-at-rest encryption. The `:?`
      # substitution form fails `docker compose up` with a clear error if the
      # variable is empty or unset — never silently boots with no encryption
      # key. Generate once per deployment with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # and add to `.env` (see README "Secrets bootstrap" section).
      GRUVAX_SECRET_KEY: "${GRUVAX_SECRET_KEY:?GRUVAX_SECRET_KEY must be set in .env}"
      MQTT_HOST: "mosquitto"
      MQTT_PORT: "1883"
      MQTT_USERNAME: "${MQTT_USERNAME:-gruvax-api}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Plan 01-10 (Rule 3 auto-fix): expose GRUVAX_ENV at runtime so the
      # entrypoint's dev-only blocks fire under `just compose-smoke`. The
      # existing build-arg (lines 55-58) bakes GRUVAX_ENV into _version.py at
      # build time but is NOT visible to the running process — without this
      # entry, the entrypoint sees the `${GRUVAX_ENV:-production}` default and
      # silently skips both the gruvax_dev stub bootstrap (Plan 01-10) AND
      # the existing synth-seed (Plan 01-06). Production-safe by default:
      # absence of operator override resolves to `production`, matching the
      # build-arg default and the entrypoint guards' fallback.
      GRUVAX_ENV: "${GRUVAX_ENV:-production}"
    ports:
      - "8000:8000"
    volumes:
      # Plan 01-06: dev-only synthetic seed for gruvax.profile_collection.
      # The entrypoint loads this AFTER alembic migrations succeed when
      # GRUVAX_ENV=development AND profile_collection is empty (idempotent).
      # In production the env is non-development so this mount is unused.
      - ./tests/fixtures/synth_profile_collection.sql:/app/tests/fixtures/synth_profile_collection.sql:ro
    networks:
      - internal
      # Uncomment to attach to the shared discogsography Postgres network (production):
      # - discogsography_default
    extra_hosts:
      # Linux: lets host.docker.internal resolve to the Docker host gateway
      # macOS/Windows: host.docker.internal is built in — this is a no-op there
      - "host.docker.internal:host-gateway"
    depends_on:
      gruvax-dev-pg:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      # Plan 01-05 / D-18: api boots against fake-discogsography in dev. In
      # production override DISCOGSOGRAPHY_BASE_URL to point at the real
      # discogsography service and remove this dependency (or run the
      # fake-discogsography service via a profile gate).
      fake-discogsography:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Local dev Postgres. A single `just up` brings this up with data: on first
  # start the api service runs `alembic upgrade head` then loads the synthetic
  # profile_collection seed from tests/fixtures/synth_profile_collection.sql.
  # (Plan 01-06: the v1 initdb mount was retired because the new fixture
  # references gruvax.profiles + gruvax.profile_collection which only exist
  # AFTER migration 0009 — initdb runs BEFORE alembic, so the old approach
  # cannot seed v2 schema. The api entrypoint owns post-migration seeding
  # via psql; the fixture is mounted into the api container instead.)
  # The api service also seeds cube boundaries on startup. To use the
  # deployment host instead, set GRUVAX_DB_HOST (see header).
  gruvax-dev-pg:
    image: postgres:18
    container_name: gruvax-dev-pg
    environment:
      POSTGRES_USER: "${GRUVAX_DB_USER:-gruvax}"
      POSTGRES_PASSWORD: "${GRUVAX_DB_PASSWORD:-gruvax}"
      POSTGRES_DB: "${GRUVAX_DB_NAME:-gruvax}"
    ports:
      - "5432:5432"
    volumes:
      # postgres:18+ stores data in a major-version subdir under this mount
      # point — mount at /var/lib/postgresql (NOT /var/lib/postgresql/data).
      - gruvax-dev-pg-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${GRUVAX_DB_USER:-gruvax} -d ${GRUVAX_DB_NAME:-gruvax}"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      # Uncomment once a passwd file is generated by the operator:
      # - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    # NO ports: — mosquitto is internal-only in v1 (DEP-01 / T-01-12)
    # ESP32 hardware will connect via the LAN listener added in Phase 5.
    networks:
      - internal
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Plan 01-05: fake-discogsography sibling (dev only, D-15) ────────────────
  # Serves the discogsography v2 contract endpoints (/api/user/collection)
  # from the canonical in-process FastAPI app at
  # src/gruvax/_internal/fake_discogsography.py. Seeded from
  # services/fake-discogsography/seed.yaml (~3000 synthetic releases,
  # generated by Plan 01-00's `just regen-synth-data`).
  #
  # PRODUCTION NOTE: this service is intended for local dev + CI. In
  # production override DISCOGSOGRAPHY_BASE_URL to point at the real
  # discogsography service and avoid bringing this up (mitigates
  # T-01-fake-leak-prod). Internal-only network — no host port mapping.
  fake-discogsography:
    image: gruvax/fake-discogsography:dev
    build:
      context: .
      dockerfile: services/fake-discogsography/Dockerfile
    container_name: gruvax-fake-discogsography
    networks:
      - internal
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request as u; req = u.Request('http://127.0.0.1:8004/api/user/collection?limit=1', headers={'Authorization': 'Bearer dscg_dev_seed'}); u.urlopen(req).read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Plan 01-05: init-sync one-shot (D-16 verbatim — idempotent) ─────────────
  # On `docker compose up`, runs ONCE after gruvax-api + fake-discogsography
  # are healthy. Performs the D-16 idempotency precheck via psql:
  #   SELECT COUNT(*) FROM gruvax.profile_collection
  #     WHERE profile_id = '00000000-0000-0000-0000-000000000001'
  # If > 0 → exit 0 with "skipping initial sync" (no re-sync on subsequent
  # boots; T-01-init-sync-rerun mitigation).
  # If == 0 → runs `gruvax-sync --profile default` via stdin-piped admin PIN.
  #
  # GRUVAX_ADMIN_PIN MUST be present in .env — the `${VAR:?...}` substitution
  # fails compose-up clearly when unset (T-01-init-sync-pin mitigation; never
  # silently boots without auth).
  init-sync:
    # init-sync intentionally has NO `build:` block — it reuses the image
    # already built and tagged by the `api` service above
    # (`ghcr.io/simplicityguy/gruvax:latest`). The `depends_on.api:
    # { condition: service_healthy }` below guarantees api is built and
    # healthy before init-sync starts, so the tagged image already exists
    # in the local daemon. Per Plan 01-05 PLAN.md line 449 intent and the
    # D-16 idempotent-precheck contract — do not re-introduce a parallel
    # `build:` block here (it triggers BuildKit duplicate-tag export
    # failure: "image ghcr.io/simplicityguy/gruvax:latest already exists").
    image: ghcr.io/simplicityguy/gruvax:latest
    container_name: gruvax-init-sync
    depends_on:
      api:
        condition: service_healthy
      fake-discogsography:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    # D-16 idempotency precheck uses the in-venv psycopg (no psql binary —
    # python:3.14-slim doesn't ship postgresql-client and we don't add it just
    # for this 1-statement query). DATABASE_URL is the SQLAlchemy form
    # (postgresql+psycopg://...) used by the rest of the app; psycopg.connect
    # accepts the libpq form, so we strip the SQLAlchemy prefix inline.
    command:
      - |
        set -e
        COUNT=$(/app/.venv/bin/python - <<'PY'
        import os, psycopg
        dsn = os.environ["DATABASE_URL"].replace("postgresql+psycopg://", "postgresql://", 1)
        with psycopg.connect(dsn) as conn, conn.cursor() as cur:
            cur.execute("SELECT COUNT(*) FROM gruvax.profile_collection WHERE profile_id = '00000000-0000-0000-0000-000000000001'")
            print(cur.fetchone()[0])
        PY
        )
        if [ "$$COUNT" -gt 0 ]; then
          echo "profile_collection already populated for default profile; skipping initial sync"
          exit 0
        fi
        echo "running initial sync"
        echo "$$GRUVAX_ADMIN_PIN" | gruvax-sync --profile default
    environment:
      GRUVAX_BASE_URL: "http://api:8000"
      # SQLAlchemy form, used by the in-venv psycopg precheck above AND by any
      # in-process app code path the init image imports.
      DATABASE_URL: "postgresql+psycopg://${GRUVAX_DB_USER:-gruvax}:${GRUVAX_DB_PASSWORD:-gruvax}@${GRUVAX_DB_HOST:-gruvax-dev-pg}:${GRUVAX_DB_PORT:-5432}/${GRUVAX_DB_NAME:-gruvax}"
      DISCOGSOGRAPHY_BASE_URL: "${DISCOGSOGRAPHY_BASE_URL:-http://fake-discogsography:8004}"
      GRUVAX_SECRET_KEY: "${GRUVAX_SECRET_KEY:?GRUVAX_SECRET_KEY must be set in .env}"
      GRUVAX_ADMIN_PIN: "${GRUVAX_ADMIN_PIN:?GRUVAX_ADMIN_PIN must be set in .env for init-sync}"
    restart: "no"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dev / diagnostics only ──────────────────────────────────────────────────
  # MQTT Explorer (web UI) for inspecting broker traffic while building the LED
  # contract (Phase 6). It reaches the broker over the `internal` Compose network
  # (host `mosquitto`, port 1883), so mosquitto STILL has no host `ports:` mapping
  # — DEP-03 (broker not exposed to the host/LAN in v1) is preserved.
  #
  # Gated behind the `debug` profile so a plain `docker compose up` / `just up`
  # does NOT start it. Launch on demand with:
  #     docker compose --profile debug up -d mqtt-explorer
  # Then open http://localhost:3000, log in (MQTT_EXPLORER_USERNAME/PASSWORD), and
  # add a connection to host `mosquitto`, port 1883 (anonymous in dev unless a
  # mosquitto passwd file is mounted). Change MQTT_EXPLORER_PASSWORD before using
  # this on a shared LAN.
  mqtt-explorer:
    image: ghcr.io/thomasnordquist/mqtt-explorer:latest
    profiles: ["debug"]
    environment:
      MQTT_EXPLORER_USERNAME: "${MQTT_EXPLORER_USERNAME:-admin}"
      MQTT_EXPLORER_PASSWORD: "${MQTT_EXPLORER_PASSWORD:-changeme}"
      # Uncomment to disable the Explorer web login (LAN dev only, behind no proxy):
      # MQTT_EXPLORER_SKIP_AUTH: "true"
    ports:
      - "${MQTT_EXPLORER_PORT:-3000}:3000"
    volumes:
      - mqtt-explorer-data:/app/data
    networks:
      - internal
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  gruvax-dev-pg-data:
  mosquitto-data:
  mosquitto-log:
  mqtt-explorer-data:

networks:
  internal:
    driver: bridge
  # Uncomment for production (discogsography_default must exist before compose up):
  # discogsography_default:
  #   external: true
