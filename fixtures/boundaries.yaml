# Synthetic cube boundary fixture for GRUVAX development and CI.
#
# Phase 5 update: last_label and last_catalog removed from all cubes.
# These were the "last" span fields in the old one-span-per-cube model.
# In the cut-point model (SEG-01 / D-05), each cube stores only its
# first_label / first_catalog (the cut point); the "last" is derived
# from the next cube's cut point by SegmentCache.
#
# 2 units × 4×4 = 32 cubes total.
# Labels reference names present in fixtures/synth_collection.sql so that
# v_collection resolves correctly (decision D-05).
#
# Row and col are 0-indexed; labels and catalog numbers use the same raw
# strings as stored in v_collection (normalization happens in the estimator).
#
# A few cubes are deliberately is_empty: true to exercise CUBE-05 (empty cube
# distinct desaturated state).

units:
  - unit_id: 1
    display_name: "Left Kallax"
    rows: 4
    cols: 4
    ordering: 1
    cubes:
      # Row 0 — starts with Blue Note BLP series
      - row: 0
        col: 0
        first_label: "Blue Note"
        first_catalog: "BLP 4001"
        is_empty: false

      # Row 0, col 1 — Blue Note BST series (multi-prefix same label)
      - row: 0
        col: 1
        first_label: "Blue Note"
        first_catalog: "BST 84001"
        is_empty: false

      # Row 0, col 2 — Creole cut. This makes bin (0,1) span Blue Note BST + Capitol +
      # Columbia = a realistic THREE-label bin for the drag-handle demo (Issue 4),
      # instead of the earlier 5-label bin that overcrowded the strip. Label order in
      # the collection: Blue Note → Capitol → Columbia → Creole → ECM → KC → Prestige.
      - row: 0
        col: 2
        first_label: "Creole"
        first_catalog: "CRLP 501"
        is_empty: false

      # Row 0, col 3 — KC mixed-separator series
      - row: 0
        col: 3
        first_label: "KC"
        first_catalog: "KC 32731"
        is_empty: false

      # Row 1, col 0 — Prestige pure-numeric catalog
      - row: 1
        col: 0
        first_label: "Prestige"
        first_catalog: "32731"
        is_empty: false

      # Row 1, col 1 — Verve multi-value catalog
      - row: 1
        col: 1
        first_label: "Verve"
        first_catalog: "BLP-100, BST-200"
        is_empty: false

      # Row 1, col 2 — Unknown placeholder catalog
      - row: 1
        col: 2
        first_label: "Unknown"
        first_catalog: "none"
        is_empty: false

      # Row 1, col 3 — Milestone
      - row: 1
        col: 3
        first_label: "Milestone"
        first_catalog: "MSP 9001"
        is_empty: false

      # Row 2 — Island / Reprise / Asylum (singleton-heavy)
      - row: 2
        col: 0
        first_label: "Island"
        first_catalog: "ILPS 9105"
        is_empty: false

      - row: 2
        col: 1
        first_label: "Reprise"
        first_catalog: "MS 2032"
        is_empty: false

      - row: 2
        col: 2
        first_label: "Asylum"
        first_catalog: "SD 5007"
        is_empty: false

      # Row 2, col 3 — intentionally empty (exercises CUBE-05)
      - row: 2
        col: 3
        first_label: null
        first_catalog: null
        is_empty: true

      # Row 3 — Columbia / Tamla / Epic / Impulse / Riverside
      - row: 3
        col: 0
        first_label: "Columbia"
        first_catalog: "C2S 841"
        is_empty: false

      - row: 3
        col: 1
        first_label: "Tamla"
        first_catalog: "T310"
        is_empty: false

      - row: 3
        col: 2
        first_label: "Impulse"
        first_catalog: "A-21"
        is_empty: false

      # Row 3, col 3 — intentionally empty (exercises CUBE-05)
      - row: 3
        col: 3
        first_label: null
        first_catalog: null
        is_empty: true

