        is_empty: false

      # Row 1, col 3 — Singleton Label 6
      - row: 1
        col: 3
        first_label: "Singleton Label 6"
        first_catalog: "S006-0042"
        is_empty: false

      # Row 2, col 0 — Singleton Label 7
      - row: 2
        col: 0
        first_label: "Singleton Label 7"
        first_catalog: "S007-0049"
        is_empty: false

      # Row 2, col 1 — Singleton Label 8
      - row: 2
        col: 1
        first_label: "Singleton Label 8"
        first_catalog: "S008-0056"
        is_empty: false

      # Row 2, col 2 — Singleton Label 9
      - row: 2
        col: 2
        first_label: "Singleton Label 9"
        first_catalog: "S009-0063"
        is_empty: false

      # Row 2, col 3 — intentionally empty (exercises CUBE-05)
      - row: 2
        col: 3
        first_label: null
        first_catalog: null
        is_empty: true

      # Row 3, col 0 — Singleton Label 10
      - row: 3
        col: 0
        first_label: "Singleton Label 10"
        first_catalog: "S010-0070"
        is_empty: false

      # Row 3, col 1 — Singleton Label 11
      - row: 3
        col: 1
        first_label: "Singleton Label 11"
        first_catalog: "S011-0077"
        is_empty: false

      # Row 3, col 2 — Singleton Label 12
      - row: 3
