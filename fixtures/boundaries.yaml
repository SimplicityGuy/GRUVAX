# Synthetic cube boundary fixture for GRUVAX development and CI.
#
# 2 units × 4×4 = 32 cubes total.
# Labels reference names present in fixtures/synth_collection.sql so that
# v_collection resolves correctly (decision D-05).
#
# Row and col are 0-indexed; labels and catalog numbers use the same raw
# strings as stored in v_collection (normalization happens in the estimator).
#
# A few cubes are deliberately is_empty: true to exercise CUBE-05 (empty cube
# distinct desaturated state).

units:
  - unit_id: 1
    display_name: "Left Kallax"
    rows: 4
    cols: 4
    ordering: 1
    cubes:
      # Row 0 — starts with Blue Note BLP series
      - row: 0
        col: 0
        first_label: "Blue Note"
        first_catalog: "BLP 4001"
        last_label: "Blue Note"
        last_catalog: "BLP 4020"
        is_empty: false

      # Row 0, col 1 — Blue Note BST series (multi-prefix same label)
      - row: 0
        col: 1
        first_label: "Blue Note"
        first_catalog: "BST 84001"
        last_label: "Blue Note"
        last_catalog: "BST 84010"
