# Synthetic cube boundary fixture for GRUVAX development and CI.
#
# Plan 01-07 update (closes Gap #1 from 01-VERIFICATION.md): cut-points
# rewritten to reference catalog numbers ACTUALLY produced by the v2 synth
# generator at tests/fixtures/generate_synth_data.py (seed=42). The previous
# v1 values (BLP 4001, BST 84001, CRLP 501, KC 32731, etc.) were inherited
# from the retired v1 fixtures/synth_collection.sql and no longer match any
# record in tests/fixtures/synth_profile_collection.sql, so SegmentCache
# bins were derived empty and locate fell through with confidence=0.0.
#
# Phase 5 baseline (carried forward): last_label and last_catalog are absent
# from all cubes. In the cut-point model (SEG-01 / D-05), each cube stores
# only its first_label / first_catalog (the cut point); the "last" is derived
# from the next cube's cut point by SegmentCache.
#
# 2 units x 4x4 = 32 cubes total.
# Labels reference names present in tests/fixtures/synth_profile_collection.sql
# (generated by tests/fixtures/generate_synth_data.py with seed=42) so that
# the SegmentCache resolves correctly (decision D-05, Plan 01-07).
#
# Row and col are 0-indexed; labels and catalog numbers use the same raw
# strings as stored in profile_collection (normalization happens in the estimator).
#
# A few cubes are deliberately is_empty: true to exercise CUBE-05 (empty cube
# distinct desaturated state). Layout DELIBERATELY excludes the "Atlantic"
# label so that test_locate.py::NO_BOUNDARY_RELEASE_ID=951 (Atlantic SD 1000)
# remains genuinely uncovered for the no-boundary contract test. "atlantic"
# casefold sorts BEFORE every other cut_label in this YAML (the smallest cut
# is "blue note"), so SegmentCache's record→bin assignment loop (which
# requires cut_key <= rec_key for SOME bin) leaves all Atlantic records
# unassigned → locate(release_id=951) returns confidence=0.0 / primary_cube=null.

units:
  - unit_id: 1
    display_name: "Left Kallax"
    rows: 4
    cols: 4
    ordering: 1
    cubes:
      # Row 0 — starts with Blue Note BLP series (first BLP catalog in v2 seed)
      - row: 0
        col: 0
        first_label: "Blue Note"
        first_catalog: "BLP 1000"
        is_empty: false

      # Row 0, col 1 — Blue Note BST series (first BST catalog in v2 seed;
      # preserves the multi-prefix-same-label scenario for label_span tests).
      - row: 0
        col: 1
        first_label: "Blue Note"
        first_catalog: "BST 1001"
        is_empty: false

      # Row 0, col 2 — Columbia (KC series, first catalog in v2 seed has no
      # separator — the generator's separator_mix begins emitting space/dash
      # variants at later record IDs).
      - row: 0
        col: 2
        first_label: "Columbia"
        first_catalog: "KC1000"
        is_empty: false

      # Row 0, col 3 — ECM (first catalog in v2 seed)
      - row: 0
        col: 3
        first_label: "ECM"
        first_catalog: "ECM 1000"
        is_empty: false

      # Row 1, col 0 — ECM continuation (mid-range catalog, splits ECM across cubes)
      - row: 1
        col: 0
        first_label: "ECM"
        first_catalog: "ECM 1150"
        is_empty: false

      # Row 1, col 1 — Impulse! (first AS catalog in v2 seed)
      - row: 1
        col: 1
        first_label: "Impulse!"
        first_catalog: "AS 1000"
        is_empty: false

      # Row 1, col 2 — Impulse! continuation (mid-range)
      - row: 1
        col: 2
        first_label: "Impulse!"
        first_catalog: "AS 1100"
        is_empty: false

      # Row 1, col 3 — Prestige (first PRLP catalog in v2 seed)
      - row: 1
        col: 3
        first_label: "Prestige"
        first_catalog: "PRLP 1000"
        is_empty: false

      # Row 2, col 0 — Prestige continuation (mid-range)
      - row: 2
        col: 0
        first_label: "Prestige"
        first_catalog: "PRLP 1075"
        is_empty: false

      # Row 2, col 1 — Pure Label (pure-numeric catalog; first in v2 seed)
      - row: 2
        col: 1
        first_label: "Pure Label"
        first_catalog: "32731"
        is_empty: false

      # Row 2, col 2 — Riverside (first RLP catalog in v2 seed)
      - row: 2
        col: 2
        first_label: "Riverside"
        first_catalog: "RLP 1000"
        is_empty: false

      # Row 2, col 3 — intentionally empty (exercises CUBE-05)
      - row: 2
        col: 3
        first_label: null
        first_catalog: null
        is_empty: true

      # Row 3, col 0 — Riverside continuation (mid-range)
      - row: 3
        col: 0
        first_label: "Riverside"
        first_catalog: "RLP 1075"
        is_empty: false

      # Row 3, col 1 — Verve (MGV variant — first MGV catalog in v2 seed)
      - row: 3
        col: 1
        first_label: "Verve"
        first_catalog: "MGV1005"
        is_empty: false

      # Row 3, col 2 — Verve (V6 variant — first V6 catalog in v2 seed;
      # multi-prefix-same-label scenario like Blue Note).
      - row: 3
        col: 2
        first_label: "Verve"
        first_catalog: "V61000"
        is_empty: false

      # Row 3, col 3 — intentionally empty (exercises CUBE-05)
      - row: 3
        col: 3
        first_label: null
        first_catalog: null
        is_empty: true

  - unit_id: 2
    display_name: "Right Kallax"
    rows: 4
    cols: 4
    ordering: 2
    cubes:
      # Row 0, col 0 — Padding Label (first PAD catalog in v2 seed). Atlantic
